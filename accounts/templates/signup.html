{% extends 'docs/base.html' %}

{% block content %}

<style>
.signup-wrapper{
    min-height:85vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.signup-card{
    width:100%;
    max-width:600px;
    border:none;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.12);
}

.signup-header{
    background:linear-gradient(135deg,#198754,#20c997);
    color:white;
    text-align:center;
    padding:35px;
}

.signup-header h2{
    margin:0;
    font-weight:700;
}

.signup-header p{
    margin-top:10px;
    margin-bottom:0;
    opacity:.9;
}

.signup-body{
    padding:35px;
    background:white;
}

.signup-body input{
    width:100%;
    border:1px solid #dee2e6;
    border-radius:12px !important;
    padding:12px 15px;
    transition:.3s;
}

.signup-body input:focus{
    border-color:#198754;
    box-shadow:0 0 0 4px rgba(25,135,84,.15);
}

.signup-btn{
    width:100%;
    border:none;
    border-radius:12px;
    padding:13px;
    font-weight:600;
    margin-top:10px;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    text-decoration:none;
    font-weight:600;
}

.logo-circle{
    width:80px;
    height:80px;
    border-radius:50%;
    background:white;
    color:#198754;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    margin:0 auto 15px;
}

.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.helptext{
    display:none;
}

.errorlist{
    color:#dc3545;
    list-style:none;
    padding:0;
    margin-bottom:10px;
    font-size:14px;
}

@media(max-width:576px){
    .form-row{
        grid-template-columns:1fr;
    }

    .signup-body{
        padding:25px;
    }
}
</style>

<div class="signup-wrapper">

<div class="card signup-card">

    <div class="signup-header">

        <div class="logo-circle">
            🚀
        </div>

        <h2>Create Account</h2>

        <p>
            Join AI Doc Chat and start chatting with your documents
        </p>

    </div>

    <div class="signup-body">

        <form method="post">

            {% csrf_token %}

            <div class="form-row mb-3">
                <div>
                    {{ form.first_name }}
                </div>

                <div>
                    {{ form.last_name }}
                </div>
            </div>

            <div class="mb-3">
                {{ form.username }}
            </div>

            <div class="mb-3">
                {{ form.password1 }}
            </div>

            <div class="mb-3">
                {{ form.password2 }}
            </div>

            <button
                type="submit"
                class="btn btn-success signup-btn">

                Create Account 🚀

            </button>

        </form>

        <div class="login-link">

            Already have an account?

            <a href="{% url 'login' %}">
                Login

            </a>

        </div>

    </div>

</div>

</div>

{% endblock %}
