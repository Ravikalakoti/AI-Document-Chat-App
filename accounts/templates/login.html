{% extends 'docs/base.html' %}
{% block title %}Login - AI Doc Chat{% endblock %}

{% block extra_css %}
<style>
  :root {
    --ease-bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh) translateX(40px); opacity: 0; }
  }
  @keyframes logoPop {
    0% { transform: scale(0) rotate(-30deg); opacity: 0; }
    60% { transform: scale(1.15) rotate(8deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .login-wrapper{
      min-height:85vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 20px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #667eea, #764ba2);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      border-radius: 28px;
  }

  .login-wrapper .particle {
      position: absolute;
      width: 5px;
      height: 5px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255,255,255,0.6);
      animation: float 16s infinite;
      z-index: 0;
  }

  .login-card{
      width:100%;
      max-width:450px;
      border:none;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 25px 70px rgba(0,0,0,.35);
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: fadeUp 0.8s var(--ease-smooth) forwards;
      transition: transform 0.4s var(--ease-smooth), box-shadow 0.4s var(--ease-smooth);
  }
  .login-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 35px 90px rgba(0,0,0,.4);
  }

  .login-header{
      background:linear-gradient(135deg,#667eea,#764ba2);
      background-size: 200% 200%;
      animation: gradientShift 6s ease infinite;
      color:white;
      text-align:center;
      padding:30px;
      position: relative;
      overflow: hidden;
  }
  .login-header h2{
      margin:0;
      font-weight:700;
      opacity: 0;
      animation: fadeUp 0.7s var(--ease-smooth) 0.2s forwards;
  }
  .login-header p{
      margin-top:8px;
      opacity:0;
      animation: fadeUp 0.7s var(--ease-smooth) 0.3s forwards;
  }
  .login-header p.anim-done { opacity: .9; }

  .login-body{
      padding:30px;
      background: white;
      opacity: 0;
      animation: fadeUp 0.7s var(--ease-smooth) 0.35s forwards;
  }

  .login-body input{
      border-radius:12px !important;
      padding:12px;
      border: 1px solid #dee2e6;
      transition: all .3s var(--ease-smooth);
      width: 100%;
  }
  .login-body input:hover {
      border-color: #b3bdf5;
  }
  .login-body input:focus{
      border-color:#667eea;
      box-shadow:0 0 0 4px rgba(102,126,234,.15);
      transform: translateY(-2px);
      outline: none;
  }

  .login-btn{
      width:100%;
      border-radius:12px;
      padding:12px;
      font-weight:600;
      border: none;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative;
      overflow: hidden;
      transition: transform .3s var(--ease-bounce), box-shadow .3s var(--ease-smooth);
      box-shadow: 0 10px 30px rgba(102,126,234,.35);
  }
  .login-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
      transition: left 0.6s;
  }
  .login-btn:hover::before { left: 100%; }
  .login-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 40px rgba(102,126,234,.5);
  }

  .signup-link{
      text-align:center;
      margin-top:20px;
      opacity: 0;
      animation: fadeUp 0.7s var(--ease-smooth) 0.45s forwards;
  }
  .signup-link a{
      text-decoration:none;
      font-weight:600;
      color: #667eea;
      position: relative;
  }
  .signup-link a::after {
      content: '';
      position: absolute;
      left: 0; bottom: -2px;
      width: 0%; height: 2px;
      background: #667eea;
      transition: width .3s var(--ease-smooth);
  }
  .signup-link a:hover::after { width: 100%; }

  .logo-circle{
      width:70px;
      height:70px;
      border-radius:50%;
      background:white;
      color:#667eea;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      margin:0 auto 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
      animation: logoPop 0.7s var(--ease-bounce) forwards, logoFloat 3s ease-in-out 0.7s infinite;
  }

  .login-body .errorlist{
      color:#dc3545;
      list-style:none;
      padding:0;
      margin-bottom:10px;
      font-size:14px;
      animation: fadeUp 0.4s var(--ease-smooth) forwards;
  }
  .login-body .helptext{
      display:none;
  }

  @media(max-width:576px){
      .login-body{
          padding:22px;
      }
  }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">

  <!-- floating particles -->
  <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
  <div class="particle" style="left: 25%; animation-delay: 3s;"></div>
  <div class="particle" style="left: 40%; animation-delay: 6s;"></div>
  <div class="particle" style="left: 55%; animation-delay: 1.5s;"></div>
  <div class="particle" style="left: 70%; animation-delay: 4.5s;"></div>
  <div class="particle" style="left: 85%; animation-delay: 2s;"></div>

  <div class="card login-card">
      <div class="login-header">
          <div class="logo-circle">
              🤖
          </div>
          <h2>AI Doc Chat</h2>
          <p class="anim-done">
              Login to access your documents
          </p>
      </div>
      <div class="login-body">
          <form method="post">
              {% csrf_token %}
              {{ form.as_p }}
              <button
                  type="submit"
                  class="btn login-btn">
                  Sign In
              </button>
          </form>
          <div class="signup-link">
              New user?
              <a href="{% url 'signup' %}">
                  Create Account
              </a>
          </div>
      </div>
  </div>
</div>
{% endblock %}
