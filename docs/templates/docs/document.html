<!DOCTYPE html>
<html>
<head>
  <title>{{ doc.title }}</title>
</head>
<body>
  <h1>{{ doc.title }}</h1>

  {% if doc.html_path %}
    <iframe src="/media/{{ doc.html_path }}" style="width:100%; height:500px;"></iframe>
  {% endif %}

  <div id="chat"></div>
  <input id="msg" type="text" placeholder="Ask something" />
  <button onclick="sendMsg()">Send</button>

  <script>
    async function sendMsg() {
      const message = document.getElementById("msg").value;
      const res = await fetch("/api/chat/{{ doc.id }}/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
      });
      const data = await res.json();
      document.getElementById("chat").innerHTML += "<p><b>You:</b> " + message + "</p>";
      document.getElementById("chat").innerHTML += "<p><b>AI:</b> " + data.reply + "</p>";
    }
  </script>
</body>
</html>
