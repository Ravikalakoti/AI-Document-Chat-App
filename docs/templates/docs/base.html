{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}AI Doc Chat{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        /* ================= NAVBAR ================= */
        .navbar {
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .user-badge {
            color: white;
            font-size: .9rem;
            margin-right: 10px;
        }

        @media(max-width:768px) {
            .navbar .d-flex {
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .user-badge {
                width: 100%;
                text-align: right;
                margin-bottom: 5px;
            }
        }

        /* ================= PROFILE DRAWER ================= */
        .profile-drawer {
            position: fixed;
            top: 0;
            right: -380px;
            width: 350px;
            height: 100%;
            background: #ffffff;
            box-shadow: -10px 0 30px rgba(0,0,0,0.2);
            transition: 0.3s ease;
            z-index: 9999;
            padding: 20px;
        }

        .profile-drawer.open {
            right: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .drawer-body {
            margin-top: 20px;
        }

        .profile-item {
            margin-bottom: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
    </style>
</head>

<body class="bg-light">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="{% url 'home' %}">
            🤖 AI Doc Chat
        </a>

        <div class="d-flex align-items-center gap-2">

            {% if user.is_authenticated %}

                <span class="user-badge">
                    👋 {{ user.first_name|default:user.username }}
                </span>

                <!-- PROFILE BUTTON -->
                <button onclick="openProfilePanel()" class="btn btn-outline-info btn-sm">
                    👤 Profile
                </button>

                <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm">
                    Dashboard
                </a>

                <a href="{% url 'upload_page' %}" class="btn btn-primary btn-sm">
                    Upload
                </a>

                <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
                    Logout
                </a>

            {% else %}

                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">
                    Login
                </a>

                <a href="{% url 'signup' %}" class="btn btn-success btn-sm">
                    Sign Up
                </a>

            {% endif %}

        </div>
    </div>
</nav>

<!-- ================= CONTENT ================= -->
<main class="container-fluid py-4">
    {% block content %}
    {% endblock %}
</main>

<!-- ================= PROFILE DRAWER ================= -->
<div id="profileDrawer" class="profile-drawer">

    <div class="drawer-header">
        <h5>👤 My Profile</h5>
        <button onclick="closeProfilePanel()" class="btn btn-sm btn-light">✖</button>
    </div>

    <div id="profileContent" class="drawer-body">
        Loading...
    </div>

</div>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/chat.js' %}"></script>

<script>
async function openProfilePanel() {
    document.getElementById("profileDrawer").classList.add("open");

    try {
        const res = await fetch("/accounts/user-profile/");
        const data = await res.json();

        document.getElementById("profileContent").innerHTML = `
            <div class="profile-item"><b>Username:</b> ${data.username}</div>
            <div class="profile-item"><b>Plan:</b> ${data.plan}</div>
            <div class="profile-item"><b>Status:</b> ${data.is_subscribed ? "Active" : "Free"}</div>
            <div class="profile-item"><b>Subscribed At:</b> ${data.subscribed_at || "N/A"}</div>
            <div class="profile-item"><b>Expires At:</b> ${data.expires_at || "N/A"}</div>
        `;
    } catch (err) {
        document.getElementById("profileContent").innerHTML =
            "<p class='text-danger'>Failed to load profile</p>";
    }
}

function closeProfilePanel() {
    document.getElementById("profileDrawer").classList.remove("open");
}
</script>

</body>
</html>
