{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Doc Chat{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{% url 'dashboard' %}">AI Doc Chat</a>
      <div class="d-flex gap-2">
        <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a href="{% url 'upload_page' %}" class="btn btn-primary btn-sm">Upload</a>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/chat.js' %}"></script>
</body>
</html>
